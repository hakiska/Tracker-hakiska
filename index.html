<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Трекер привычек</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;600;700;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: var(--tg-theme-bg-color, #080f1e);
    --bg2: var(--tg-theme-secondary-bg-color, #0d1628);
    --text: var(--tg-theme-text-color, #e2e8f0);
    --hint: var(--tg-theme-hint-color, #94a3b8);
    --link: var(--tg-theme-link-color, #3b82f6);
    --btn: var(--tg-theme-button-color, #3b82f6);
    --btn-text: var(--tg-theme-button-text-color, #ffffff);

    --bg3: #111d35;
    --card: #121d35;
    --border: #1c2d4f;
    --border2: #243354;
    --text2: #94a3b8;
    --text3: #4a5d80;
    --blue: #3b82f6;
    --green: #22c55e;
    --yellow: #f59e0b;
    --red: #ef4444;
    --w1: #ef4444;
    --w2: #8b5cf6;
    --w3: #38bdf8;
    --w4: #f59e0b;
    --w5: #22c55e;
    --nav-h: 60px;
    --header-h: 52px;
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }

  /* TG light theme override */
  .tg-light {
    --bg3: #f0f4f8;
    --card: #ffffff;
    --border: #dde3ed;
    --border2: #c5cfe0;
    --text2: #4a5568;
    --text3: #94a3b8;
    --blue: #3b82f6;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; font-size: 14px; }

  #app { display: flex; flex-direction: column; height: 100%; }
  #header { height: var(--header-h); background: var(--bg2); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 14px; flex-shrink: 0; }
  #content { flex: 1; overflow-y: auto; overflow-x: hidden; padding: 14px; padding-bottom: calc(var(--nav-h) + var(--safe-bottom) + 14px); -webkit-overflow-scrolling: touch; }
  #nav { height: calc(var(--nav-h) + var(--safe-bottom)); padding-bottom: var(--safe-bottom); background: var(--bg2); border-top: 1px solid var(--border); display: flex; align-items: flex-start; position: fixed; bottom: 0; left: 0; right: 0; z-index: 50; padding-top: 6px; }

  .header-title { font-family: 'Unbounded', sans-serif; font-size: 12px; font-weight: 700; color: var(--text); letter-spacing: 0.08em; }
  .month-nav { display: flex; align-items: center; gap: 6px; }
  .month-btn { width: 28px; height: 28px; border: 1px solid var(--border2); background: var(--bg3); border-radius: 7px; color: var(--hint); font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
  .month-label { font-family: 'Unbounded', sans-serif; font-size: 9px; color: var(--hint); letter-spacing: 0.06em; min-width: 100px; text-align: center; }

  .nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 2px; cursor: pointer; padding: 4px 2px; border: none; background: none; color: var(--text3); transition: color 0.2s; }
  .nav-btn.active { color: var(--btn); }
  .nav-icon { font-size: 18px; }
  .nav-label { font-size: 8px; font-weight: 600; letter-spacing: 0.04em; }

  .card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; margin-bottom: 10px; }
  .card-header { padding: 10px 14px; background: var(--bg2); border-bottom: 1px solid var(--border); font-family: 'Unbounded', sans-serif; font-size: 9px; font-weight: 700; letter-spacing: 0.1em; color: var(--btn); }

  .chk { width: 22px; height: 22px; border: 1.5px solid var(--border2); border-radius: 5px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.15s; background: var(--bg2); }
  .chk.done { background: var(--btn); border-color: var(--btn); }
  .chk.done::after { content: '✓'; color: var(--btn-text); font-size: 13px; font-weight: 700; }

  .inp { background: transparent; border: none; outline: none; color: var(--text); font-family: inherit; font-size: 13px; width: 100%; }
  .inp::placeholder { color: var(--text3); }
  .inp-box { background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; padding: 9px 12px; }

  .page { display: none; }
  .page.active { display: block; }

  /* TRACKER */
  .tg-row { display: flex; align-items: center; gap: 3px; padding: 4px 0; border-bottom: 1px solid var(--border); }
  .tg-name { width: 150px; flex-shrink: 0; display: flex; align-items: center; gap: 5px; padding-right: 6px; }
  .tg-name span { font-size: 11px; color: var(--text2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .day-col-h { width: 22px; text-align: center; font-size: 8px; flex-shrink: 0; }
  .tg-check { width: 19px; height: 19px; border: 1.5px solid var(--border2); border-radius: 4px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.1s; flex-shrink: 0; }
  .tg-check.done { background: var(--btn); border-color: var(--btn); }
  .tg-check.done::after { content: '✓'; color: var(--btn-text); font-size: 10px; }
  .cat-label { font-family: 'Unbounded', sans-serif; font-size: 8px; font-weight: 700; letter-spacing: 0.1em; padding: 7px 12px 3px; color: var(--btn); }

  .pb-bg { height: 5px; background: var(--bg3); border-radius: 3px; overflow: hidden; }
  .pb-fill { height: 100%; border-radius: 3px; transition: width 0.4s; }

  .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px; }
  .stat-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 12px; text-align: center; }
  .stat-val { font-family: 'Unbounded', sans-serif; font-size: 22px; font-weight: 700; }
  .stat-lbl { font-size: 9px; color: var(--text3); letter-spacing: 0.08em; margin-top: 3px; }

  .bar-chart { display: flex; gap: 4px; align-items: flex-end; height: 90px; }
  .bar-col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 2px; }
  .bar-rect { width: 100%; border-radius: 3px 3px 0 0; min-height: 3px; }
  .bar-lbl { font-size: 8px; color: var(--text3); }
  .bar-val { font-size: 8px; font-weight: 700; }

  .wm-table { width: 100%; border-collapse: collapse; }
  .wm-table td, .wm-table th { padding: 7px 8px; border-bottom: 1px solid var(--border); font-size: 11px; }
  .wm-table th { font-size: 9px; font-weight: 600; color: var(--text3); text-align: center; }

  .top3-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .day-card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 8px; }
  .day-card-title { font-family: 'Unbounded', sans-serif; font-size: 9px; font-weight: 700; color: var(--btn); margin-bottom: 6px; }
  .task-row { display: flex; align-items: center; gap: 5px; margin-bottom: 4px; }
  .task-inp { font-size: 10px; flex: 1; background: transparent; border: none; outline: none; color: var(--text2); font-family: inherit; }
  .task-inp::placeholder { color: var(--text3); font-size: 9px; }
  .task-done { text-decoration: line-through; color: var(--text3) !important; }

  .goal-cat { font-family: 'Unbounded', sans-serif; font-size: 9px; font-weight: 700; color: var(--btn); letter-spacing: 0.1em; margin-bottom: 6px; padding: 7px 10px; background: var(--bg2); border-radius: 7px; }
  .goal-row { display: flex; align-items: center; gap: 7px; margin-bottom: 5px; padding: 7px 9px; background: var(--bg3); border: 1px solid var(--border); border-radius: 7px; }
  .goal-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--btn); flex-shrink: 0; }

  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 200; display: flex; align-items: flex-end; }
  .modal { background: var(--bg2); border: 1px solid var(--border); border-radius: 18px 18px 0 0; width: 100%; padding: 18px 14px calc(28px + var(--safe-bottom)); }
  .modal-title { font-family: 'Unbounded', sans-serif; font-size: 13px; font-weight: 700; margin-bottom: 16px; color: var(--text); }
  .modal-label { font-size: 10px; color: var(--text3); margin-bottom: 5px; margin-top: 12px; letter-spacing: 0.05em; }
  .modal-select { background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; padding: 9px 10px; width: 100%; color: var(--text); font-family: inherit; font-size: 13px; outline: none; }
  .modal-btns { display: flex; gap: 7px; margin-top: 18px; }
  .btn { flex: 1; padding: 11px; border-radius: 10px; border: none; cursor: pointer; font-family: 'Unbounded', sans-serif; font-size: 10px; font-weight: 700; letter-spacing: 0.04em; }
  .btn-primary { background: var(--btn); color: var(--btn-text); }
  .btn-secondary { background: var(--bg3); color: var(--text2); border: 1px solid var(--border); }
  .btn-danger { background: #1a0a0a; color: var(--red); border: 1px solid #3d1515; }

  .scroll-hint { font-size: 9px; color: var(--text3); text-align: right; padding: 3px 0 5px; }
  .section-title { font-family: 'Unbounded', sans-serif; font-size: 10px; font-weight: 700; color: var(--text); margin-bottom: 12px; letter-spacing: 0.06em; }

  .fab { position: fixed; right: 14px; bottom: calc(var(--nav-h) + var(--safe-bottom) + 12px); width: 46px; height: 46px; border-radius: 50%; background: var(--btn); border: none; color: var(--btn-text); font-size: 22px; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 18px rgba(59,130,246,0.45); z-index: 40; }

  .subtab-btns { display: flex; gap: 6px; margin-bottom: 14px; overflow-x: auto; }
  .subtab-btn { padding: 7px 12px; border-radius: 8px; border: none; cursor: pointer; font-family: 'Unbounded', sans-serif; font-size: 9px; font-weight: 700; letter-spacing: 0.04em; white-space: nowrap; flex-shrink: 0; }
  .subtab-btn.active { background: var(--btn); color: var(--btn-text); }
  .subtab-btn:not(.active) { background: var(--bg3); color: var(--text3); border: 1px solid var(--border); }

  /* Pulse animation on checkmark */
  @keyframes pop { 0%{transform:scale(1)} 40%{transform:scale(1.25)} 100%{transform:scale(1)} }
  .pop { animation: pop 0.2s ease; }
</style>
</head>
<body>
<div id="app">
  <div id="header">
    <div class="header-title">⚡ ПРИВЫЧКИ</div>
    <div class="month-nav">
      <button class="month-btn" onclick="prevMonth()">‹</button>
      <div class="month-label" id="monthLabel"></div>
      <button class="month-btn" onclick="nextMonth()">›</button>
    </div>
  </div>

  <div id="content">
    <!-- TODAY -->
    <div class="page active" id="page-today">
      <div class="section-title" id="todayTitle"></div>
      <div class="card" style="padding:12px;margin-bottom:10px;">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
          <span style="font-size:10px;color:var(--text3);letter-spacing:0.05em;">ПРОГРЕСС СЕГОДНЯ</span>
          <span style="font-family:'Unbounded',sans-serif;font-size:13px;font-weight:700;" id="todayPct">0%</span>
        </div>
        <div class="pb-bg" style="height:8px;border-radius:4px;">
          <div class="pb-fill" id="todayPbar" style="width:0%;height:8px;border-radius:4px;background:var(--btn);"></div>
        </div>
        <div style="display:flex;justify-content:space-between;margin-top:6px;font-size:10px;color:var(--text3);">
          <span id="todayDone">0 выполнено</span>
          <span id="todayLeft">0 осталось</span>
        </div>
      </div>
      <div id="todayHabits"></div>
      <div id="todayEmpty" style="display:none;text-align:center;padding:30px 20px;">
        <div style="font-size:32px;margin-bottom:10px;">🌱</div>
        <div style="font-size:12px;color:var(--text3);margin-bottom:14px;">Добавьте первую привычку</div>
        <button onclick="openAddHabit()" style="background:var(--btn);color:var(--btn-text);border:none;padding:10px 20px;border-radius:10px;font-family:'Unbounded',sans-serif;font-size:10px;font-weight:700;cursor:pointer;">+ ДОБАВИТЬ</button>
      </div>
    </div>

    <!-- TRACKER -->
    <div class="page" id="page-tracker">
      <div class="section-title">📅 ТРЕКЕР — <span id="trackerML"></span></div>
      <div class="scroll-hint">← прокрутите горизонтально →</div>
      <div id="trackerContent"></div>
    </div>

    <!-- STATS -->
    <div class="page" id="page-stats">
      <div class="section-title">📊 СТАТИСТИКА</div>
      <div id="statsContent"></div>
    </div>

    <!-- GOALS -->
    <div class="page" id="page-goals">
      <div class="section-title">🎯 ЦЕЛИ НА ГОД</div>
      <div id="goalsContent"></div>
    </div>

    <!-- MORE -->
    <div class="page" id="page-more">
      <div class="section-title">📋 ЕЩЁ</div>
      <div class="subtab-btns">
        <button class="subtab-btn active" id="stab-weekly" onclick="setSubtab('weekly')">Еженедельные</button>
        <button class="subtab-btn" id="stab-monthly" onclick="setSubtab('monthly')">Ежемесячные</button>
        <button class="subtab-btn" id="stab-top3" onclick="setSubtab('top3')">Топ-3 задачи</button>
      </div>
      <div id="subtab-weekly"></div>
      <div id="subtab-monthly" style="display:none;"></div>
      <div id="subtab-top3" style="display:none;"></div>
    </div>
  </div>

  <div id="nav">
    <button class="nav-btn active" id="nav-today" onclick="switchTab('today')"><span class="nav-icon">☀️</span><span class="nav-label">СЕГОДНЯ</span></button>
    <button class="nav-btn" id="nav-tracker" onclick="switchTab('tracker')"><span class="nav-icon">📅</span><span class="nav-label">ТРЕКЕР</span></button>
    <button class="nav-btn" id="nav-stats" onclick="switchTab('stats')"><span class="nav-icon">📊</span><span class="nav-label">СТАТИСТИКА</span></button>
    <button class="nav-btn" id="nav-goals" onclick="switchTab('goals')"><span class="nav-icon">🎯</span><span class="nav-label">ЦЕЛИ</span></button>
    <button class="nav-btn" id="nav-more" onclick="switchTab('more')"><span class="nav-icon">📋</span><span class="nav-label">ЕЩЁ</span></button>
  </div>
</div>

<button class="fab" id="fab" onclick="openAddHabit()">+</button>

<div class="modal-overlay" id="modal" style="display:none;" onclick="closeModal(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-title" id="modalTitle">✨ Новая привычка</div>
    <div class="modal-label">Название</div>
    <div class="inp-box"><input class="inp" id="habitName" placeholder="Название привычки..." /></div>
    <div style="display:flex;gap:8px;">
      <div style="flex:1;">
        <div class="modal-label">Сфера</div>
        <select class="modal-select" id="habitCat">
          <option>ФИНАНСЫ</option><option>ДУХОВНОСТЬ</option><option>КАРЬЕРА</option>
          <option selected>ЗДОРОВЬЕ</option><option>ОТНОШЕНИЯ</option><option>ТВОРЧЕСТВО</option>
        </select>
      </div>
      <div style="width:68px;">
        <div class="modal-label">Emoji</div>
        <div class="inp-box" style="text-align:center;"><input class="inp" id="habitEmoji" value="⭐" style="text-align:center;font-size:20px;" /></div>
      </div>
    </div>
    <div class="modal-btns">
      <button class="btn btn-danger" id="deleteBtn" onclick="deleteHabit()" style="display:none;">Удалить</button>
      <button class="btn btn-secondary" onclick="closeModal()">Отмена</button>
      <button class="btn btn-primary" onclick="saveHabit()">Сохранить</button>
    </div>
  </div>
</div>

<script>
// ===== TELEGRAM SDK =====
const tg = window.Telegram && window.Telegram.WebApp;
if (tg) {
  tg.ready();
  tg.expand();
  // Apply theme
  if (tg.colorScheme === 'light') {
    document.documentElement.classList.add('tg-light');
  }
}

function haptic(type) {
  if (tg && tg.HapticFeedback) {
    if (type === 'light') tg.HapticFeedback.impactOccurred('light');
    if (type === 'medium') tg.HapticFeedback.impactOccurred('medium');
    if (type === 'success') tg.HapticFeedback.notificationOccurred('success');
    if (type === 'error') tg.HapticFeedback.notificationOccurred('error');
  }
}

// ===== STATE =====
const CATS = ["ФИНАНСЫ","ДУХОВНОСТЬ","КАРЬЕРА","ЗДОРОВЬЕ","ОТНОШЕНИЯ","ТВОРЧЕСТВО"];
const MONTHS_RU = ["Январь","Февраль","Март","Апрель","Май","Июнь","Июль","Август","Сентябрь","Октябрь","Ноябрь","Декабрь"];
const DAYS_S = ["Пн","Вт","Ср","Чт","Пт","Сб","Вс"];
const WC = ["#ef4444","#8b5cf6","#38bdf8","#f59e0b","#22c55e"];

let state = loadState();
let currentTab = "today";
let currentSubtab = "weekly";
let editingIdx = null;

function loadState() {
  try { const s = localStorage.getItem("hbt_tg_v1"); if (s) return JSON.parse(s); } catch {}
  const now = new Date();
  return {
    month: now.getMonth(), year: now.getFullYear(),
    habits: [],
    checks: {},
    weeklyHabits: Array(8).fill(""), weeklyChecks: {},
    monthlyHabits: Array(8).fill(""), monthlyChecks: {},
    top3: {},
    yearGoals: CATS.map(c => ({ cat: c, goals: ["","",""], daily: ["",""], weekly: ["",""], monthly: [""] })),
  };
}

function save() { localStorage.setItem("hbt_tg_v1", JSON.stringify(state)); }

// ===== NAV =====
function switchTab(tab) {
  haptic('light');
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('page-' + tab).classList.add('active');
  document.getElementById('nav-' + tab).classList.add('active');
  currentTab = tab;
  document.getElementById('fab').style.display = (tab === 'tracker' || tab === 'today') ? 'flex' : 'none';
  render();
}

function setSubtab(st) {
  haptic('light');
  currentSubtab = st;
  ['weekly','monthly','top3'].forEach(s => {
    document.getElementById('subtab-' + s).style.display = s === st ? 'block' : 'none';
    const btn = document.getElementById('stab-' + s);
    btn.classList.toggle('active', s === st);
  });
  renderMore();
}

function prevMonth() { haptic('light'); if (state.month===0){state.month=11;state.year--;}else state.month--; resetMonth(); render(); }
function nextMonth() { haptic('light'); if (state.month===11){state.month=0;state.year++;}else state.month++; resetMonth(); render(); }
function resetMonth() { state.checks={}; state.weeklyChecks={}; state.monthlyChecks={}; state.top3={}; save(); }

// ===== HELPERS =====
function dim() { return new Date(state.year, state.month+1, 0).getDate(); }
function fdm() { let d=new Date(state.year,state.month,1).getDay(); return d===0?6:d-1; }
function getDayInfo() {
  const f=fdm(), t=dim();
  return Array.from({length:t},(_,i)=>({day:i+1,dow:(f+i)%7,week:Math.floor((f+i)/7)}));
}
function hStats(hi) {
  const d=dim(); let done=0;
  for(let i=1;i<=d;i++) if(state.checks[`${hi}_${i}`]) done++;
  return {done,total:d,pct:Math.round(done/d*100)};
}
function totalStats() {
  const ah=state.habits.filter(h=>h.name), d=dim(), possible=ah.length*d;
  const done=Object.values(state.checks).filter(Boolean).length;
  return {done,possible,pct:possible>0?Math.round(done/possible*100):0};
}
function todayStats(day) {
  const ah=state.habits.map((h,i)=>({...h,i})).filter(h=>h.name);
  const done=ah.filter(h=>state.checks[`${h.i}_${day}`]).length;
  return {done,total:ah.length,pct:ah.length>0?Math.round(done/ah.length*100):0};
}
function pctColor(p) { return p>=70?'var(--green)':p>=40?'var(--yellow)':'var(--red)'; }
function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function escA(s) { return (s||'').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }

// ===== RENDER =====
function render() {
  updateMonthLabel();
  if (currentTab==='today') renderToday();
  if (currentTab==='tracker') renderTracker();
  if (currentTab==='stats') renderStats();
  if (currentTab==='goals') renderGoals();
  if (currentTab==='more') renderMore();
}

function updateMonthLabel() {
  const s = MONTHS_RU[state.month].substring(0,3).toUpperCase()+' '+state.year;
  document.getElementById('monthLabel').textContent = s;
  const el=document.getElementById('trackerML'); if(el) el.textContent=MONTHS_RU[state.month].toUpperCase();
}

// TODAY
function renderToday() {
  const now=new Date();
  const day=now.getDate();
  const isCur=now.getMonth()===state.month&&now.getFullYear()===state.year;
  const d=isCur?day:1;
  const dowIdx=(new Date(state.year,state.month,d).getDay()||7)-1;
  document.getElementById('todayTitle').textContent=isCur?`${DAYS_S[dowIdx]}, ${d} ${MONTHS_RU[state.month].toLowerCase()}`:`${MONTHS_RU[state.month]} ${state.year}`;

  const ts=todayStats(d);
  document.getElementById('todayPct').textContent=ts.pct+'%';
  document.getElementById('todayPbar').style.width=ts.pct+'%';
  document.getElementById('todayPbar').style.background=ts.pct>=70?'var(--green)':ts.pct>=40?'var(--yellow)':'var(--btn)';
  document.getElementById('todayDone').textContent=ts.done+' выполнено';
  document.getElementById('todayLeft').textContent=(ts.total-ts.done)+' осталось';

  const active=state.habits.filter(h=>h.name);
  document.getElementById('todayEmpty').style.display=active.length===0?'block':'none';

  let html='';
  CATS.forEach(cat=>{
    const ch=state.habits.map((h,i)=>({...h,i})).filter(h=>h.name&&h.cat===cat);
    if(!ch.length) return;
    html+=`<div class="cat-label">${cat}</div><div class="card" style="margin-bottom:10px;">`;
    ch.forEach(h=>{
      const done=!!state.checks[`${h.i}_${d}`];
      html+=`<div style="display:flex;align-items:center;gap:10px;padding:11px 12px;border-bottom:1px solid var(--border);" onclick="toggleToday(${h.i},${d},this)">
        <div class="chk ${done?'done':''}"></div>
        <span style="font-size:15px;">${h.emoji||'⭐'}</span>
        <span style="font-size:12px;color:${done?'var(--text3)':'var(--text)'};text-decoration:${done?'line-through':'none'};flex:1;">${esc(h.name)}</span>
        <span style="font-size:9px;color:${pctColor(hStats(h.i).pct)};font-weight:700;">${hStats(h.i).pct}%</span>
      </div>`;
    });
    html+=`</div>`;
  });
  document.getElementById('todayHabits').innerHTML=html;
}

function toggleToday(hi,day,el) {
  haptic('light');
  state.checks[`${hi}_${day}`]=!state.checks[`${hi}_${day}`];
  if(state.checks[`${hi}_${day}`]) haptic('success');
  save(); renderToday();
}

// TRACKER
function renderTracker() {
  const dayInfo=getDayInfo();
  const activeH=state.habits.map((h,i)=>({...h,i})).filter(h=>h.name);
  let html='<div class="card"><div style="overflow-x:auto;"><div style="min-width:max-content;">';

  // Day numbers header
  html+=`<div style="display:flex;align-items:center;padding:5px 0;padding-left:152px;gap:3px;border-bottom:1px solid var(--border);">`;
  dayInfo.forEach(({day,week})=>{html+=`<div class="day-col-h" style="color:${WC[week]};width:22px;">${day}</div>`;});
  html+=`</div>`;
  // Dow header
  html+=`<div style="display:flex;align-items:center;padding:2px 0;padding-left:152px;gap:3px;border-bottom:1px solid var(--border);">`;
  dayInfo.forEach(({dow,week})=>{html+=`<div class="day-col-h" style="color:var(--border2);width:22px;">${DAYS_S[dow][0]}</div>`;});
  html+=`</div>`;

  CATS.forEach(cat=>{
    const ch=activeH.filter(h=>h.cat===cat);
    if(!ch.length) return;
    html+=`<div class="cat-label">${cat}</div>`;
    ch.forEach(h=>{
      const hs=hStats(h.i);
      html+=`<div class="tg-row">
        <div class="tg-name" style="width:152px;">
          <span style="font-size:13px;">${h.emoji||'⭐'}</span>
          <span>${esc(h.name)}</span>
          <span style="font-size:12px;cursor:pointer;" onclick="openEditHabit(${h.i})">✏️</span>
        </div>`;
      dayInfo.forEach(({day})=>{
        const done=!!state.checks[`${h.i}_${day}`];
        html+=`<div style="width:22px;height:26px;display:flex;align-items:center;justify-content:center;flex-shrink:0;">
          <div class="tg-check ${done?'done':''}" onclick="toggleCheck(${h.i},${day})"></div>
        </div>`;
      });
      html+=`<div style="margin-left:5px;min-width:44px;">
        <div style="font-size:9px;color:${pctColor(hs.pct)};font-weight:700;">${hs.pct}%</div>
        <div class="pb-bg" style="width:38px;margin-top:1px;"><div class="pb-fill" style="width:${hs.pct}%;background:${pctColor(hs.pct)}"></div></div>
      </div></div>`;
    });
  });

  if(!activeH.length) html+=`<div style="padding:28px;text-align:center;color:var(--text3);font-size:12px;">Нажмите + чтобы добавить привычку</div>`;
  html+=`</div></div></div>`;
  document.getElementById('trackerContent').innerHTML=html;
}

function toggleCheck(hi,day) {
  haptic('light');
  state.checks[`${hi}_${day}`]=!state.checks[`${hi}_${day}`];
  if(state.checks[`${hi}_${day}`]) haptic('success');
  save(); renderTracker();
}

// STATS
function renderStats() {
  const ts=totalStats(), dayInfo=getDayInfo(), days=dim();
  const activeH=state.habits.map((h,i)=>({...h,i})).filter(h=>h.name);

  // Weekly
  const wStats=[0,1,2,3,4].map(w=>{
    const wd=dayInfo.filter(d=>d.week===w);
    const possible=wd.length*activeH.length; let done=0;
    wd.forEach(({day})=>activeH.forEach((_,hi)=>{if(state.checks[`${hi}_${day}`])done++;}));
    return {done,possible,pct:possible>0?Math.round(done/possible*100):0};
  }).filter(w=>w.possible>0);

  let html=`<div class="stat-grid">
    <div class="stat-card"><div class="stat-val" style="color:var(--btn)">${ts.done}</div><div class="stat-lbl">ВЫПОЛНЕНО</div></div>
    <div class="stat-card"><div class="stat-val" style="color:${pctColor(ts.pct)}">${ts.pct}%</div><div class="stat-lbl">ПРОГРЕСС</div></div>
    <div class="stat-card"><div class="stat-val" style="color:var(--yellow)">${ts.possible-ts.done}</div><div class="stat-lbl">ОСТАЛОСЬ</div></div>
    <div class="stat-card"><div class="stat-val" style="color:var(--text2)">${ts.possible}</div><div class="stat-lbl">ВСЕГО</div></div>
  </div>`;

  html+=`<div class="card" style="padding:12px;margin-bottom:10px;">
    <div style="font-family:'Unbounded',sans-serif;font-size:9px;color:var(--text3);letter-spacing:0.08em;margin-bottom:8px;">ПРОГРЕСС МЕСЯЦА</div>
    <div class="pb-bg" style="height:10px;border-radius:5px;">
      <div class="pb-fill" style="width:${ts.pct}%;height:10px;border-radius:5px;background:linear-gradient(90deg,var(--btn),${pctColor(ts.pct)});"></div>
    </div>
    <div style="text-align:center;margin-top:5px;font-family:'Unbounded',sans-serif;font-size:14px;font-weight:700;color:${pctColor(ts.pct)}">${ts.pct}%</div>
  </div>`;

  if(wStats.length){
    const mx=Math.max(...wStats.map(w=>w.pct),1);
    html+=`<div class="card" style="padding:12px;margin-bottom:10px;">
      <div style="font-family:'Unbounded',sans-serif;font-size:9px;color:var(--text3);letter-spacing:0.08em;margin-bottom:10px;">ПО НЕДЕЛЯМ</div>
      <div class="bar-chart">`;
    wStats.forEach((w,i)=>{
      const h=Math.max(4,Math.round(w.pct/mx*75));
      html+=`<div class="bar-col">
        <div class="bar-val" style="color:${WC[i]}">${w.pct}%</div>
        <div style="flex:1;display:flex;align-items:flex-end;width:100%"><div class="bar-rect" style="height:${h}px;background:${WC[i]};opacity:0.85;"></div></div>
        <div class="bar-lbl">Н${i+1}</div>
      </div>`;
    });
    html+=`</div></div>`;
  }

  // Daily mini chart
  html+=`<div class="card" style="padding:12px;margin-bottom:10px;">
    <div style="font-family:'Unbounded',sans-serif;font-size:9px;color:var(--text3);letter-spacing:0.08em;margin-bottom:8px;">ЕЖЕДНЕВНО</div>
    <div style="overflow-x:auto;">
    <div style="display:flex;gap:2px;align-items:flex-end;height:50px;min-width:${days*18}px;">`;
  dayInfo.forEach(({day,week})=>{
    const done=activeH.filter((_,hi)=>state.checks[`${hi}_${day}`]).length;
    const h=activeH.length>0?Math.max(2,Math.round(done/activeH.length*42)):2;
    html+=`<div style="display:flex;flex-direction:column;align-items:center;gap:1px;flex:1;">
      <div style="font-size:6px;color:${WC[week]};font-weight:700;">${done||''}</div>
      <div style="width:100%;height:${h}px;background:${WC[week]};border-radius:2px 2px 0 0;opacity:0.85;min-height:2px;"></div>
      <div style="font-size:6px;color:var(--text3);">${day}</div>
    </div>`;
  });
  html+=`</div></div></div>`;

  if(activeH.length){
    html+=`<div class="card" style="padding:12px;">
      <div style="font-family:'Unbounded',sans-serif;font-size:9px;color:var(--text3);letter-spacing:0.08em;margin-bottom:10px;">ПО ПРИВЫЧКАМ</div>`;
    activeH.forEach(h=>{
      const hs=hStats(h.i);
      html+=`<div style="margin-bottom:10px;">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:3px;">
          <span style="font-size:11px;color:var(--text2);">${h.emoji} ${esc(h.name)}</span>
          <span style="font-size:10px;font-weight:700;color:${pctColor(hs.pct)}">${hs.pct}%</span>
        </div>
        <div class="pb-bg"><div class="pb-fill" style="width:${hs.pct}%;background:${pctColor(hs.pct)}"></div></div>
        <div style="font-size:9px;color:var(--text3);margin-top:1px;">${hs.done} из ${hs.total} дней</div>
      </div>`;
    });
    html+=`</div>`;
  }

  document.getElementById('statsContent').innerHTML=html;
}

// GOALS
function renderGoals() {
  let html='';
  state.yearGoals.forEach((yg,ci)=>{
    html+=`<div style="margin-bottom:14px;"><div class="goal-cat">${yg.cat}</div>`;
    html+=`<div style="font-size:9px;color:var(--text3);letter-spacing:0.06em;margin-bottom:5px;padding-left:3px;">ЦЕЛИ НА ГОД</div>`;
    yg.goals.forEach((g,gi)=>{
      html+=`<div class="goal-row"><div class="goal-dot"></div><input class="inp" value="${escA(g)}" placeholder="Добавить цель..." oninput="updGoal(${ci},'goals',${gi},this.value)" /></div>`;
    });
    [['daily','ЕЖЕДНЕВНЫЕ'],['weekly','ЕЖЕНЕДЕЛЬНЫЕ'],['monthly','ЕЖЕМЕСЯЧНЫЕ']].forEach(([key,lbl])=>{
      html+=`<div style="font-size:9px;color:var(--text3);letter-spacing:0.06em;margin-top:8px;margin-bottom:5px;padding-left:3px;">${lbl} ПРИВЫЧКИ</div>`;
      yg[key].forEach((h,hi)=>{
        html+=`<div class="goal-row" style="border-color:var(--border);"><span style="font-size:11px;">📌</span><input class="inp" value="${escA(h)}" placeholder="Добавить привычку..." oninput="updGoal(${ci},'${key}',${hi},this.value)" /></div>`;
      });
    });
    html+=`</div>`;
  });
  document.getElementById('goalsContent').innerHTML=html;
}
function updGoal(ci,type,idx,val){state.yearGoals[ci][type][idx]=val;save();}

// MORE
function renderMore(){renderWeekly();renderMonthly();renderTop3();}

function renderWeekly(){
  let html=`<div class="card"><div style="overflow-x:auto;"><table class="wm-table"><tr><th style="text-align:left;min-width:130px;">Привычка</th>`;
  [1,2,3,4,5].forEach((w,i)=>{html+=`<th style="color:${WC[i]};">Н${w}</th>`;});
  html+=`</tr>`;
  for(let ri=0;ri<8;ri++){
    html+=`<tr><td><input class="inp" value="${escA(state.weeklyHabits[ri]||'')}" placeholder="Привычка..." oninput="updWH(${ri},this.value)" /></td>`;
    [0,1,2,3,4].forEach(wi=>{
      const done=!!(state.weeklyChecks&&state.weeklyChecks[`${ri}_${wi}`]);
      html+=`<td style="text-align:center;"><div class="chk ${done?'done':''}" style="margin:0 auto;width:19px;height:19px;" onclick="togWH(${ri},${wi})"></div></td>`;
    });
    html+=`</tr>`;
  }
  html+=`</table></div></div>`;
  document.getElementById('subtab-weekly').innerHTML=html;
}

function renderMonthly(){
  let html=`<div class="card"><table class="wm-table"><tr><th style="text-align:left;">Привычка</th><th>✓</th></tr>`;
  for(let ri=0;ri<8;ri++){
    const done=!!(state.monthlyChecks&&state.monthlyChecks[ri]);
    html+=`<tr><td><input class="inp" value="${escA(state.monthlyHabits[ri]||'')}" placeholder="Привычка..." oninput="updMH(${ri},this.value)" /></td>
      <td style="text-align:center;"><div class="chk ${done?'done':''}" style="margin:0 auto;width:19px;height:19px;" onclick="togMH(${ri})"></div></td></tr>`;
  }
  html+=`</table></div>`;
  document.getElementById('subtab-monthly').innerHTML=html;
}

function renderTop3(){
  const days=dim();
  let html=`<div class="top3-grid">`;
  for(let d=1;d<=days;d++){
    html+=`<div class="day-card"><div class="day-card-title">${d} ${MONTHS_RU[state.month].substring(0,3)}</div>`;
    for(let ti=0;ti<3;ti++){
      const val=(state.top3&&state.top3[`${d}_${ti}`])||'';
      const done=!!(state.top3&&state.top3[`${d}_${ti}_c`]);
      html+=`<div class="task-row">
        <div class="chk ${done?'done':''}" style="width:17px;height:17px;" onclick="togT3(${d},${ti})"></div>
        <input class="task-inp ${done?'task-done':''}" value="${escA(val)}" placeholder="Задача ${ti+1}" oninput="updT3(${d},${ti},this.value)" />
      </div>`;
    }
    html+=`</div>`;
  }
  html+=`</div>`;
  document.getElementById('subtab-top3').innerHTML=html;
}

function updWH(ri,v){state.weeklyHabits[ri]=v;save();}
function updMH(ri,v){state.monthlyHabits[ri]=v;save();}
function updT3(d,ti,v){if(!state.top3)state.top3={};state.top3[`${d}_${ti}`]=v;save();}
function togWH(ri,wi){haptic('light');if(!state.weeklyChecks)state.weeklyChecks={};state.weeklyChecks[`${ri}_${wi}`]=!state.weeklyChecks[`${ri}_${wi}`];save();renderWeekly();}
function togMH(ri){haptic('light');if(!state.monthlyChecks)state.monthlyChecks={};state.monthlyChecks[ri]=!state.monthlyChecks[ri];save();renderMonthly();}
function togT3(d,ti){haptic('light');if(!state.top3)state.top3={};state.top3[`${d}_${ti}_c`]=!state.top3[`${d}_${ti}_c`];save();renderTop3();}

// MODAL
function openAddHabit(){
  haptic('medium');
  editingIdx=null;
  document.getElementById('modalTitle').textContent='✨ Новая привычка';
  document.getElementById('habitName').value='';
  document.getElementById('habitCat').value='ЗДОРОВЬЕ';
  document.getElementById('habitEmoji').value='⭐';
  document.getElementById('deleteBtn').style.display='none';
  document.getElementById('modal').style.display='flex';
  setTimeout(()=>document.getElementById('habitName').focus(),100);
}
function openEditHabit(idx){
  haptic('medium');
  editingIdx=idx;
  const h=state.habits[idx];
  document.getElementById('modalTitle').textContent='✏️ Изменить привычку';
  document.getElementById('habitName').value=h.name||'';
  document.getElementById('habitCat').value=h.cat||'ЗДОРОВЬЕ';
  document.getElementById('habitEmoji').value=h.emoji||'⭐';
  document.getElementById('deleteBtn').style.display='block';
  document.getElementById('modal').style.display='flex';
}
function closeModal(e){
  if(!e||e.target===document.getElementById('modal')){
    document.getElementById('modal').style.display='none';
  }
}
function saveHabit(){
  const name=document.getElementById('habitName').value.trim();
  if(!name){haptic('error');document.getElementById('habitName').focus();return;}
  haptic('success');
  const cat=document.getElementById('habitCat').value;
  const emoji=document.getElementById('habitEmoji').value||'⭐';
  if(editingIdx!==null){state.habits[editingIdx]={...state.habits[editingIdx],name,cat,emoji};}
  else{state.habits.push({name,cat,emoji});}
  save();
  document.getElementById('modal').style.display='none';
  render();
}
function deleteHabit(){
  if(editingIdx===null)return;
  haptic('medium');
  state.habits.splice(editingIdx,1);
  const nc={};
  Object.entries(state.checks).forEach(([k,v])=>{
    const [hi,day]=k.split('_').map(Number);
    if(hi<editingIdx)nc[k]=v;
    else if(hi>editingIdx)nc[`${hi-1}_${day}`]=v;
  });
  state.checks=nc;
  save();
  document.getElementById('modal').style.display='none';
  editingIdx=null;
  render();
}

// INIT
render();
</script>
</body>
</html>
